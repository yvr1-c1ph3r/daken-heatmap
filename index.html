<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KEYS Heatmap</title>
<style>
  body { font-family: Inter, -apple-system, "Segoe UI", "Hiragino Sans", Meiryo, sans-serif;
         margin: 0; padding: 0; color: #2c3a47; background: transparent;
         display: flex; justify-content: center; }
  .card { background: #fff; border: 1px solid #e3e8ee; border-radius: 12px;
          padding: 20px 24px; box-shadow: 0 1px 4px rgba(51,89,123,.06); display: inline-block; }

  /* ---- page 1: input ---- */
  #inputPage { width: 100%; max-width: 452px; padding: 24px 16px; box-sizing: border-box; }
  #inputPage .card { width: 100%; box-sizing: border-box; }
  .title { font-size: 15px; font-weight: 700; letter-spacing: .06em; color: #33597b; margin-bottom: 16px; }
  .drop { border: 1.5px dashed #c9d7e4; border-radius: 10px; padding: 26px 16px; text-align: center;
          color: #8b98a5; font-size: 12.5px; cursor: pointer; transition: .15s; }
  .drop:hover, .drop.over { border-color: #5d87a6; background: #f4f8fb; color: #5d87a6; }
  .drop b { color: #5d87a6; }
  .or { display: flex; align-items: center; gap: 10px; margin: 16px 0 12px; color: #b6c1cb; font-size: 11px; letter-spacing: .15em; }
  .or::before, .or::after { content: ""; flex: 1; height: 1px; background: #e3e8ee; }
  .note { font-size: 11.5px; color: #8b98a5; margin-bottom: 6px; }
  .note a { color: #5d87a6; font-weight: 600; }
  textarea { width: 100%; box-sizing: border-box; height: 110px; border: 1px solid #e3e8ee; border-radius: 8px;
             padding: 10px; font-size: 11.5px; font-family: ui-monospace, Consolas, monospace; color: #2c3a47;
             resize: vertical; outline: none; }
  textarea:focus { border-color: #93b1c7; }
  button.go { width: 100%; margin-top: 12px; padding: 10px; border: none; border-radius: 8px;
              background: #33597b; color: #fff; font-size: 13px; font-weight: 600; letter-spacing: .08em;
              cursor: pointer; transition: .15s; }
  button.go:hover { background: #2a4a67; }
  .err { color: #c0574f; font-size: 11.5px; margin-top: 8px; display: none; }

  /* ---- page 2: heatmap ---- */
  #heatmapPage { display: none; width: 100%; }
  #heatmapPage .card { display: block; width: 100%; box-sizing: border-box; }
  #svgHolder svg { display: block; width: 100%; height: auto; }
  #svgHolder svg + svg { margin-top: 10px; }
  .head { flex-wrap: wrap; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; gap: 24px; }
  .total { font-size: 26px; font-weight: 700; letter-spacing: .02em; color: #33597b; }
  .total small { font-size: 12px; font-weight: 600; color: #8b98a5; margin-left: 6px; letter-spacing: .12em; }
  .meta { font-size: 11.5px; color: #8b98a5; letter-spacing: .08em; font-variant-numeric: tabular-nums; }
  .meta b { color: #5d87a6; font-weight: 600; }
  .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 11px; color: #8b98a5; }
  .legend { display: flex; align-items: center; gap: 5px; }
  .sq { width: 11px; height: 11px; border-radius: 2.5px; display: inline-block; }
  .back { color: #b6c1cb; cursor: pointer; letter-spacing: .05em; }
  .back:hover { color: #5d87a6; }

  /* ---- mobile: 1画面にぴったり収める ---- */
  @media (max-width: 500px) {
    html, body { height: 100%; }
    body { height: 100vh; height: 100dvh; overflow: hidden; }
    #heatmapPage { height: 100%; }
    #heatmapPage .card { height: 100%; display: flex; flex-direction: column; }
    .head { flex-shrink: 0; }
    #svgHolder { flex: 1; min-height: 0; display: flex; flex-direction: column; justify-content: space-evenly; }
    #svgHolder svg { width: 100%; height: auto; max-height: 31%; }
    #svgHolder svg + svg { margin-top: 0; }
    .foot { flex-shrink: 0; }
  }
</style>
</head>
<body>

<!-- ============ PAGE 1 : CSV input ============ -->
<div id="inputPage">
  <div class="card">
    <div class="title">KEYS HEATMAP</div>

    <div class="drop" id="dropZone">
      <b>CSVファイルを選択</b> またはここにドラッグ＆ドロップ
      <input type="file" id="fileInput" accept=".csv,text/csv" hidden>
    </div>

    <div class="or">OR</div>

    <div class="note">CSVダウンロードは<a href="https://p.eagate.573.jp/game/2dx/33/djdata/score_download.html" target="_blank" rel="noopener">こちら</a>から</div>
    <textarea id="pasteArea" placeholder="プレー日,鍵盤,スクラッチ&#10;2026/07/05,60568,3427&#10;…をそのまま貼り付け"></textarea>
    <button class="go" id="goBtn">ヒートマップを表示</button>
    <div class="err" id="errMsg"></div>
  </div>
</div>

<!-- ============ PAGE 2 : heatmap ============ -->
<div id="heatmapPage">
  <div class="card">
    <div class="head">
      <div class="total"><span id="totalKeys"></span><small>KEYS</small></div>
      <div class="meta" id="metaText"></div>
    </div>
    <div id="svgHolder"></div>
    <div class="foot">
      <span class="back" id="backBtn">← CSVを読み込み直す</span>
      <span class="legend" id="legendHolder">Less </span>
    </div>
  </div>
</div>

<script>
const COLORS = ['#edf0f3', '#c9d7e4', '#93b1c7', '#5d87a6', '#33597b'];
const MONTHS = ['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW_JA = ['月','火','水','木','金','土','日'];

function level(v) {
  if (v === 0) return 0;
  if (v <= 20000) return 1;
  if (v <= 40000) return 2;
  if (v <= 60000) return 3;
  return 4;
}

function parseCSV(text) {
  const data = new Map(); // 'YYYY-MM-DD' -> keys
  const lines = text.replace(/^﻿/, '').split(/\r?\n/);
  for (const line of lines) {
    const cols = line.trim().split(/[,\t]/);
    if (cols.length < 2) continue;
    const m = cols[0].match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})$/);
    if (!m) continue; // header etc.
    const v = parseInt(cols[1].replace(/[^\d\-]/g, ''), 10);
    if (isNaN(v)) continue;
    const key = `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    data.set(key, (data.get(key) || 0) + v);
  }
  return data;
}

function d(str) { const [y,m,dd] = str.split('-').map(Number); return new Date(y, m-1, dd); }
function addDays(date, n) { const x = new Date(date); x.setDate(x.getDate() + n); return x; }
function fmtKey(date) { return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`; }
function fmtDot(date) { return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`; }
function fmtSlash(date) { return `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`; }

let currentData = null;

// 1つのヒートマップSVGを生成（weeks=描画する週数、viewWeeks=viewBox上の週数＝段間でセルサイズを揃える用）
function buildSVG(data, start, weeks, viewWeeks, gridEnd) {
  const CELL = 11, GAP = 3, STEP = CELL + GAP, LEFT = 32, TOP = 20;
  const w = LEFT + viewWeeks * STEP + 10, h = TOP + 7 * STEP + 6;

  let svg = `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="Inter,-apple-system,Segoe UI,Helvetica,Arial,sans-serif" font-size="10">`;

  const labels = [];
  let lastMonth = -1;
  for (let wk = 0; wk < weeks; wk++) {
    const monday = addDays(start, wk * 7);
    if (monday.getMonth() !== lastMonth) {
      labels.push([wk, monday.getMonth()]);
      lastMonth = monday.getMonth();
    }
  }
  // 次の月ラベルと近すぎて重なる場合（3列未満）は前のラベルを省略
  labels.forEach(([wk, m], idx) => {
    if (idx < labels.length - 1 && labels[idx + 1][0] - wk < 3) return;
    svg += `<text x="${LEFT + wk*STEP}" y="${TOP-8}" fill="#8b98a5">${MONTHS[m+1]}</text>`;
  });
  [[0,'Mon'],[2,'Wed'],[4,'Fri']].forEach(([i,l]) =>
    svg += `<text x="${LEFT-5}" y="${TOP + i*STEP + 9}" text-anchor="end" fill="#8b98a5">${l}</text>`);

  for (let wk = 0; wk < weeks; wk++) {
    for (let dow = 0; dow < 7; dow++) {
      const day = addDays(start, wk*7 + dow);
      if (day > gridEnd) break;
      const v = data.get(fmtKey(day)) || 0;
      svg += `<rect x="${LEFT + wk*STEP}" y="${TOP + dow*STEP}" width="${CELL}" height="${CELL}" rx="2.5" fill="${COLORS[level(v)]}">` +
             `<title>${fmtSlash(day)} (${DOW_JA[dow]}) 鍵盤: ${v.toLocaleString()}</title></rect>`;
    }
  }
  return svg + '</svg>';
}

function render(data) {
  const keys = [...data.keys()].sort();
  const minDate = d(keys[0]), maxDate = d(keys[keys.length-1]);
  const STEP = 14, LEFT = 32;

  // 全期間グリッド（Monday始まり、最大53週）
  const gridEnd = addDays(maxDate, 6 - ((maxDate.getDay() + 6) % 7)); // forward to Sunday
  const dataWeeks = Math.ceil(((gridEnd - addDays(minDate, -((minDate.getDay() + 6) % 7))) / 864e5 + 1) / 7);
  const fullWeeks = Math.min(dataWeeks, 53);
  const fullStart = addDays(gridEnd, -(fullWeeks * 7 - 1)); // Monday

  const holder = document.getElementById('svgHolder');
  const holderW = holder.clientWidth || 800;

  let html = '';
  if (holderW < 500) {
    // スマホ: 全期間を約4か月ずつ3段に分割して縦に並べる
    const segCount = Math.min(3, Math.ceil(fullWeeks / 18));
    const segWeeks = Math.ceil(fullWeeks / segCount);
    for (let i = 0; i < segCount; i++) {
      const segStart = addDays(fullStart, i * segWeeks * 7);
      const wks = Math.min(segWeeks, fullWeeks - i * segWeeks);
      if (wks <= 0) break;
      html += buildSVG(data, segStart, wks, segWeeks, gridEnd);
    }
  } else {
    // PC/タブレット: 幅に収まる週数だけ直近から表示
    let weeks = Math.floor((holderW - LEFT - 10) / STEP);
    weeks = Math.max(12, Math.min(weeks, fullWeeks));
    const start = addDays(gridEnd, -(weeks * 7 - 1));
    html = buildSVG(data, start, weeks, weeks, gridEnd);
  }
  holder.innerHTML = html;

  // 合計・日数・期間はCSV全体の値（表示範囲に依存しない）
  let total = 0;
  for (const v of data.values()) total += v;
  document.getElementById('totalKeys').textContent = total.toLocaleString();
  document.getElementById('metaText').innerHTML =
    `${fmtDot(minDate)} — ${fmtDot(maxDate)}&ensp;/&ensp;<b>${data.size}</b> days`;

  const lg = document.getElementById('legendHolder');
  lg.innerHTML = 'Less ' + COLORS.map(c => `<span class="sq" style="background:${c}"></span>`).join('') + ' More';
}

function showHeatmap(data) {
  currentData = data;
  document.getElementById('inputPage').style.display = 'none';
  document.getElementById('heatmapPage').style.display = 'block';
  render(data); // 表示後に幅を測って描画
}

// リサイズで表示期間を再計算
let resizeTimer;
window.addEventListener('resize', () => {
  if (!currentData) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => render(currentData), 150);
});

const STORAGE_KEY = 'keysHeatmapCSV';

function load(text, save = true) {
  const err = document.getElementById('errMsg');
  const data = parseCSV(text);
  if (data.size === 0) {
    err.textContent = 'データを読み取れませんでした。「プレー日,鍵盤,スクラッチ」形式のCSVを指定してください。';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  if (save) { try { localStorage.setItem(STORAGE_KEY, text); } catch (e) {} }
  showHeatmap(data);
}

// --- file upload ---
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files[0]) readFile(fileInput.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
});
function readFile(file) {
  const reader = new FileReader();
  reader.onload = () => load(reader.result);
  reader.readAsText(file); // UTF-8 (BOM対応済み)
}

// --- paste ---
document.getElementById('goBtn').addEventListener('click', () =>
  load(document.getElementById('pasteArea').value));

// --- back ---
document.getElementById('backBtn').addEventListener('click', () => {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  currentData = null;
  document.getElementById('heatmapPage').style.display = 'none';
  document.getElementById('inputPage').style.display = 'block';
  fileInput.value = '';
});

// --- 起動時: 保存済みデータがあればヒートマップを直接表示 ---
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) load(saved, false);
} catch (e) {}
</script>
</body>
</html>
